# =========================================================================
# COMPÉTENCE C19.2 - CONFIGURATION SONARQUBE (TASKLIST BACKEND)
# =========================================================================

# Identifiants uniques du projet 
sonar.projectKey=certif-wilfrid-tasklist-backend
sonar.projectName=Wilfrid - TaskList Backend

# URL du serveur SonarQube de la plateforme d'évaluation
sonar.host.url=https://sonarqube.cicd.kits.ext.educentre.fr

# Gestion des Sources et des Tests
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.test.ts,src/__tests__/**/*.e2e.test.ts

# Encodage du code source
sonar.sourceEncoding=UTF-8

# Exclusions de l'analyse globale (Clean Code)
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  coverage/**,\
  reports/**,\
  prisma/migrations/**,\
  **/*.config.ts,\
  **/*.config.js

# Exclusions spécifiques aux fichiers de tests
sonar.test.exclusions=\
  node_modules/**,\
  dist/**

# Exclusion du moteur de détection de duplication (CPD) pour les fichiers de tests
sonar.cpd.exclusions=\
  src/__tests__/**

# Couverture de tests TypeScript / JavaScript (Passerelle Vitest)
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info



